# Example: TLS terminates at nginx, transparent traffic is forwarded to TRANSPARENT_PORT.
# Replace certificate paths with your local trusted certificate files.

server {
    listen 443 ssl;
    server_name anyrouter.top;

    ssl_certificate     /path/to/anyrouter.top.pem;
    ssl_certificate_key /path/to/anyrouter.top-key.pem;

    location / {
        proxy_pass http://127.0.0.1:8788;
        proxy_set_header Host 127.0.0.1:8788;
        proxy_set_header X-Dispatch-Target-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
    }
}

server {
    listen 8787;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:8787;
    }
}
